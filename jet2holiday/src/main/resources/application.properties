spring.application.name=jet2holiday

# Connection
spring.datasource.url=jdbc:mysql://localhost:3306/portfolio_app_db
spring.datasource.username=root
spring.datasource.password=

# Schema generation
spring.jpa.hibernate.ddl-auto=update

# Hibernate extras
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# LLM advice integration (OpenAI-compatible chat completions API)
llm.enabled=${LLM_ENABLED:false}
llm.api.endpoint=${LLM_API_ENDPOINT:https://api.openai.com/v1/chat/completions}
llm.api.key=${LLM_API_KEY:}
llm.api.model=${LLM_API_MODEL:gpt-4o-mini}
llm.api.timeout-ms=${LLM_API_TIMEOUT_MS:12000}
# Finnhub market data integration
marketdata.finnhub.base-url=https://finnhub.io/api/v1
marketdata.finnhub.api-key=${FINNHUB_API_KEY:d768k29r01qm4b7tbmcgd768k29r01qm4b7tbmd0}
marketdata.finnhub.timeout-ms=${FINNHUB_API_TIMEOUT_MS:8000}